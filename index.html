<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>JA Sachz</title>
<meta name="description" content="Notas sobre filosofía, estoicismo, fe y la búsqueda de paz."/>
<link rel="icon" type="image/png" href="favicon.png"/>
<link rel="apple-touch-icon" href="favicon.png"/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="style.css"/>
</head>
<body>
<div class="wrap">
  <header class="site-header">
    <div>
      <div class="site-title">JA Sachz</div>
      <div class="site-tagline">Filosofía, estoicismo, fe y la búsqueda de paz.</div>
    </div>
    <nav class="site-nav">
      <a href="index.html">Inicio</a>
      <a href="admin.html">Editor</a>
    </nav>
  </header>

  <main>
    <section id="hero"></section>

    <div class="section-title">Últimos artículos</div>
    <div class="post-grid" id="postGrid">
      <div class="post-empty">Cargando artículos…</div>
    </div>
  </main>

  <footer class="site-footer">
    <span>&copy; 2026 JA Sachz</span>
  </footer>
</div>

<script>
const SB_URL='https://xduylfmrmxqnbtpyyjvb.supabase.co';
const SB_KEY='sb_publishable_SySQb0TjyYmE8qZ8TD2CXw_z8rQG-65';

function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function fmtDate(iso){
  if(!iso)return'';
  try{return new Date(iso).toLocaleDateString('es-MX',{day:'numeric',month:'long',year:'numeric'});}catch{return'';}
}
function initials(){return 'JAS';}
function cardImg(a,cls){
  if(a.cover_image) return `<div class="${cls}"><img src="${esc(a.cover_image)}" alt=""/></div>`;
  return `<div class="${cls} placeholder"><span>${initials()}</span></div>`;
}

async function loadPosts(){
  const hero=document.getElementById('hero');
  const grid=document.getElementById('postGrid');
  let articles=[];
  try{
    const res=await fetch(SB_URL+'/rest/v1/articles?published=eq.true&order=published_at.desc',
      {headers:{'apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY}});
    articles=await res.json();
    if(!res.ok) throw new Error('Supabase error');
  }catch(e){
    grid.innerHTML='<div class="post-empty">No se pudieron cargar los artículos.</div>';
    return;
  }

  if(!Array.isArray(articles)||!articles.length){
    grid.innerHTML='<div class="post-empty">Todavía no hay artículos publicados.</div>';
    return;
  }

  const [first,...rest]=articles;

  hero.innerHTML=`
    <div class="hero">
      ${cardImg(first,'hero-img')}
      <div>
        ${first.discipline?`<span class="hero-tag">${esc(first.discipline)}</span>`:''}
        <h1 class="hero-title"><a href="article.html?id=${esc(first.id)}">${esc(first.title)}</a></h1>
        ${first.abstract?`<p class="hero-excerpt">${esc(first.abstract)}</p>`:''}
        <div class="hero-meta">${esc(fmtDate(first.published_at))}${first.read_time?' · '+esc(first.read_time):''}</div>
      </div>
    </div>
  `;

  if(!rest.length){
    grid.innerHTML='';
    document.querySelector('.section-title').style.display='none';
    return;
  }

  grid.innerHTML=rest.map(a=>`
    <a class="post-card" href="article.html?id=${esc(a.id)}">
      ${cardImg(a,'post-card-img')}
      ${a.discipline?`<div class="post-card-tag">${esc(a.discipline)}</div>`:''}
      <h2 class="post-card-title">${esc(a.title)}</h2>
      ${a.abstract?`<p class="post-card-excerpt">${esc(a.abstract)}</p>`:''}
      <div class="post-card-meta">${esc(fmtDate(a.published_at))}${a.read_time?' · '+esc(a.read_time):''}</div>
    </a>
  `).join('');
}

loadPosts();
</script>
</body>
</html>
