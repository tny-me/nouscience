<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Animi Regnum</title>
<link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,300;0,400;0,700;1,300;1,400&family=Roboto+Mono:wght@400&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Roboto', sans-serif;
    background: #fff;
    color: #111;
    min-height: 100vh;
  }

  .nav {
    background: #111;
    border-bottom: 2px solid #C4A96A;
    padding: 0 56px;
    height: 54px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .nav-logo { font-size: 14px; font-weight: 700; letter-spacing: .1em; text-transform: uppercase; color: #fff; }
  .nav-logo span { color: #C4A96A; font-weight: 300; }
  .nav-links { display: flex; align-items: center; gap: 28px; }
  .nav-links a { font-size: 11px; letter-spacing: .12em; text-transform: uppercase; color: #888; text-decoration: none; transition: color .2s; }
  .nav-links a:hover { color: #C4A96A; }
  .nav-btn { background: #C4A96A; color: #111; padding: 7px 20px; font-size: 11px; letter-spacing: .1em; text-transform: uppercase; font-weight: 700; border: none; cursor: pointer; font-family: inherit; transition: background .2s; text-decoration: none; display: inline-block; }
  .nav-btn:hover { background: #D4B97A; }

  .page { max-width: 1280px; margin: 0 auto; padding: 52px 80px 80px 64px; }

  .grid { display: grid; grid-template-columns: 1fr 300px; gap: 48px; align-items: start; }

  /* ── FEED ── */
  .feed { position: relative; }

  /* ── ENTRY ── */
  .entry {
    display: grid;
    grid-template-columns: 56px 1fr;
    margin-bottom: 0;
    position: relative;
    transition: opacity .3s;
    opacity: 0;
    transform: translateY(16px);
  }
  .entry.visible { opacity: 1; transform: translateY(0); transition: opacity .5s ease, transform .5s ease; }
  .entry.hidden { opacity: .05 !important; pointer-events: none; }

  /* LEFT TIMELINE COL */
  .entry-left {
    display: flex;
    flex-direction: column;
    align-items: center;
    position: relative;
  }

  /* number above dot */
  .entry-n {
    font-family: 'Roboto Mono', monospace;
    font-size: 11px;
    font-weight: 700;
    font-style: italic;
    color: #C4A96A;
    letter-spacing: .04em;
    line-height: 1;
    margin-bottom: 8px;
    opacity: .7;
  }

  /* dot */
  .entry-dot {
    width: 10px;
    height: 10px;
    border-radius: 50%;
    background: #fff;
    border: 2px solid #C4A96A;
    flex-shrink: 0;
    position: relative;
    z-index: 2;
    transition: background .3s, transform .3s;
  }
  .entry:hover .entry-dot {
    background: #C4A96A;
    transform: scale(1.3);
  }

  /* vertical line — only between dot and bottom of entry, NOT between entries */
  .entry-line {
    width: 1px;
    flex: 1;
    min-height: 32px;
    background: linear-gradient(to bottom, #C4A96A, #E8E2D6);
    margin-top: 4px;
  }

  /* RIGHT CONTENT */
  .entry-body {
    padding: 0 0 52px 24px;
  }

  .entry-top {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 10px;
    padding-top: 2px;
  }
  .entry-tag {
    font-family: 'Roboto Mono', monospace;
    font-size: 9px;
    letter-spacing: .2em;
    text-transform: uppercase;
    color: #C4A96A;
  }
  .entry-top-line { flex: 1; height: 1px; background: #EDEBE5; }
  .entry-date {
    font-family: 'Roboto Mono', monospace;
    font-size: 9px;
    color: #C0BCB5;
    letter-spacing: .07em;
    white-space: nowrap;
  }

  .entry-title {
    font-size: 26px;
    font-weight: 700;
    line-height: 1.18;
    color: #111;
    margin-bottom: 10px;
    letter-spacing: -.01em;
    transition: color .25s;
  }
  .entry:hover .entry-title { color: #8B6F47; }

  .entry-lead {
    font-size: 15px;
    font-style: italic;
    font-weight: 300;
    color: #777;
    line-height: 1.72;
    margin-bottom: 18px;
  }

  .entry-p-first::first-letter {
    font-size: 52px;
    font-weight: 700;
    line-height: .8;
    float: left;
    margin-right: 6px;
    margin-top: 4px;
    color: transparent;
    background: linear-gradient(135deg, #C4A96A 0%, #8B6F47 60%, #4A3520 100%);
    -webkit-background-clip: text;
    background-clip: text;
  }

  .entry-p {
    font-size: 15px;
    font-weight: 400;
    line-height: 1.88;
    color: #2E2E2E;
    margin-bottom: 14px;
  }

  .entry-subhead {
    font-family: 'Roboto Mono', monospace;
    font-size: 9px;
    letter-spacing: .22em;
    text-transform: uppercase;
    color: #ABABAB;
    margin: 20px 0 10px;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .entry-subhead::after { content: ''; flex: 1; height: 1px; background: #F0EDE8; }

  .entry-bq {
    border-left: 2px solid #C4A96A;
    padding: 0 0 0 18px;
    margin: 18px 0;
  }
  .entry-bq p { font-size: 15px; font-style: italic; font-weight: 300; color: #444; line-height: 1.65; }
  .entry-bq cite { display: block; margin-top: 7px; font-family: 'Roboto Mono', monospace; font-size: 9px; letter-spacing: .12em; text-transform: uppercase; color: #C0BCB5; font-style: normal; }

  .entry-foot {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-top: 20px;
    padding-top: 14px;
    border-top: 1px solid #F0EDE8;
  }
  .entry-brand { font-family: 'Roboto Mono', monospace; font-size: 9px; color: #D0CEC9; letter-spacing: .1em; text-transform: uppercase; }
  .entry-cta {
    font-family: 'Roboto Mono', monospace;
    font-size: 9px;
    letter-spacing: .14em;
    text-transform: uppercase;
    color: #C4A96A;
    font-weight: 700;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 7px;
    text-decoration: none;
  }
  .cta-line { width: 16px; height: 1px; background: #C4A96A; display: inline-block; position: relative; flex-shrink: 0; transition: width .25s; }
  .entry-cta:hover .cta-line { width: 28px; }
  .cta-line::after { content: ''; position: absolute; right: 0; top: -3px; width: 5px; height: 5px; border-right: 1.5px solid #C4A96A; border-top: 1.5px solid #C4A96A; transform: rotate(45deg); }

  /* ── SIDEBAR ── */
  .sidebar { display: flex; flex-direction: column; gap: 2px; position: sticky; top: 74px; }
  .sb-cap { background: #111; padding: 16px 20px; border-bottom: 2px solid #C4A96A; }
  .sb-cap-name { font-size: 12px; font-weight: 700; letter-spacing: .1em; text-transform: uppercase; color: #fff; }
  .sb-cap-vol { font-family: 'Roboto Mono', monospace; font-size: 9px; color: #C4A96A; letter-spacing: .07em; margin-top: 4px; }
  .sb-card { background: #fff; border: 1px solid #E8E4DC; }
  .sb-sec { padding: 16px 20px; border-bottom: 1px solid #EDEBE5; }
  .sb-sec:last-child { border-bottom: none; }
  .sb-lbl { font-family: 'Roboto Mono', monospace; font-size: 8px; letter-spacing: .2em; text-transform: uppercase; color: #C0BCB5; display: block; margin-bottom: 10px; padding-bottom: 8px; border-bottom: 1px solid #F0ECE4; }
  .tags { display: flex; flex-wrap: wrap; gap: 5px; }
  .ftag { font-size: 10px; letter-spacing: .1em; text-transform: uppercase; padding: 5px 12px; background: #F8F6F2; color: #666; border: 1px solid #E4DFD6; cursor: pointer; transition: all .2s; font-weight: 500; font-family: inherit; }
  .ftag.active, .ftag:hover { background: #111; color: #fff; border-color: #111; }
  .qtext { font-size: 13px; font-style: italic; font-weight: 300; color: #555; line-height: 1.68; margin-bottom: 8px; }
  .qsrc { font-family: 'Roboto Mono', monospace; font-size: 9px; letter-spacing: .1em; text-transform: uppercase; color: #C0BCB5; }
  .arc-item { padding: 10px 0; border-bottom: 1px solid #F5F2EA; cursor: pointer; }
  .arc-item:last-child { border-bottom: none; }
  .arc-item:hover .arc-t { color: #C4A96A; }
  .arc-cat { font-family: 'Roboto Mono', monospace; font-size: 8px; letter-spacing: .12em; text-transform: uppercase; color: #C4A96A; margin-bottom: 3px; }
  .arc-t { font-size: 13px; font-weight: 500; color: #111; line-height: 1.35; transition: color .2s; }
  .arc-d { font-family: 'Roboto Mono', monospace; font-size: 9px; color: #C0BCB5; margin-top: 3px; }
  .stats { display: grid; grid-template-columns: 1fr 1fr; gap: 1px; background: #E8E4DC; border: 1px solid #E8E4DC; margin-top: 2px; }
  .stat { background: #fff; padding: 16px 8px; text-align: center; }
  .stat-n { font-size: 24px; font-weight: 700; color: #111; font-style: italic; line-height: 1; }
  .stat-l { font-size: 9px; color: #C0BCB5; text-transform: uppercase; letter-spacing: .07em; margin-top: 4px; }

  .footer { background: #111; border-top: 2px solid #C4A96A; padding: 20px 56px; display: flex; justify-content: space-between; align-items: center; margin-top: 40px; }
  .footer-l { font-family: 'Roboto Mono', monospace; font-size: 10px; color: #555; font-style: italic; }
  .footer-r { display: flex; gap: 24px; }
  .footer-r a { font-size: 10px; letter-spacing: .12em; text-transform: uppercase; color: #555; text-decoration: none; transition: color .2s; }
  .footer-r a:hover { color: #C4A96A; }
</style>
</head>
<body>

<nav class="nav">
  <div class="nav-logo">Animi<span> — </span>Regnum</div>
  <a class="nav-btn" href="admin.html">Acceso</a>
</nav>

<div class="page">
  <div class="grid">

    <div class="feed" id="feed">
      <p style="padding:40px 0;font-style:italic;color:#999;font-size:14px">Cargando entradas…</p>
    </div>

    <div class="sidebar">
      <div class="sb-cap">
        <div class="sb-cap-name">Animi Regnum</div>
        <div class="sb-cap-vol" id="live-clock">cargando...</div>
      </div>
      <div class="sb-card">
        <div class="sb-sec">
          <span class="sb-lbl">Filtrar</span>
          <div class="tags">
            <button class="ftag active" onclick="filter(this,'todos')">Todos</button>
            <button class="ftag" onclick="filter(this,'Filosofía')">Filosofía</button>
            <button class="ftag" onclick="filter(this,'Estoicismo')">Estoicismo</button>
            <button class="ftag" onclick="filter(this,'Fe')">Fe</button>
            <button class="ftag" onclick="filter(this,'Teología')">Teología</button>
            <button class="ftag" onclick="filter(this,'Paz')">Paz</button>
            <button class="ftag" onclick="filter(this,'Reflexión')">Reflexión</button>
          </div>
        </div>
        <div class="sb-sec">
          <span class="sb-lbl">Esta semana</span>
          <p class="qtext">"La filosofía promete sobre todo: sentido común, humanidad y fraternidad."</p>
          <p class="qsrc">Séneca · Epístola V</p>
        </div>
        <div class="sb-sec">
          <span class="sb-lbl">Archivo</span>
          <div id="sb-archive"></div>
        </div>
      </div>
      <div class="stats">
        <div class="stat"><div class="stat-n" id="stat-count">—</div><div class="stat-l">Ensayos</div></div>
        <div class="stat"><div class="stat-n">III</div><div class="stat-l">Años</div></div>
        <div class="stat"><div class="stat-n">∞</div><div class="stat-l">Sin ads</div></div>
        <div class="stat"><div class="stat-n">1</div><div class="stat-l">Autor</div></div>
      </div>
    </div>

  </div>
</div>

<footer class="footer">
  <span class="footer-l">Animi Regnum · est. 2023</span>
  <div class="footer-r">
    <a href="#">RSS</a><a href="#">Archivo</a><a href="#">Contacto</a>
  </div>
</footer>

<script src="demo-posts.js"></script>
<script>
const SB_URL='https://xduylfmrmxqnbtpyyjvb.supabase.co';
const SB_KEY='sb_publishable_SySQb0TjyYmE8qZ8TD2CXw_z8rQG-65';

/* ── LIVE CLOCK ── */
function updateClock(){
  const now=new Date();
  const dias=["Dom","Lun","Mar","Mié","Jue","Vie","Sáb"];
  const meses=["Ene","Feb","Mar","Abr","May","Jun","Jul","Ago","Sep","Oct","Nov","Dic"];
  const hh=String(now.getHours()).padStart(2,"0");
  const mm=String(now.getMinutes()).padStart(2,"0");
  const ss=String(now.getSeconds()).padStart(2,"0");
  document.getElementById("live-clock").textContent=
    dias[now.getDay()]+" "+now.getDate()+" "+meses[now.getMonth()]+" "+now.getFullYear()+
    " · "+hh+":"+mm+":"+ss;
}
updateClock();setInterval(updateClock,1000);

/* ── HELPERS ── */
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function fmtDate(iso){
  if(!iso)return'';
  try{return new Date(iso).toLocaleDateString('es-MX',{day:'2-digit',month:'short',year:'numeric'}).toUpperCase();}catch{return'';}
}
function fmtMonth(iso){
  if(!iso)return'';
  try{return new Date(iso).toLocaleDateString('es-MX',{month:'short',year:'numeric'}).toUpperCase();}catch{return'';}
}
function firstPara(html){
  if(!html)return'';
  const d=new DOMParser().parseFromString(html,'text/html');
  const p=d.querySelector('p');
  return p?p.textContent.trim().substring(0,300):'';
}

/* ── SCROLL REVEAL ── */
function attachReveal(){
  const obs=new IntersectionObserver((entries)=>{
    entries.forEach((e,i)=>{
      if(e.isIntersecting){
        setTimeout(()=>e.target.classList.add('visible'),i*80);
        obs.unobserve(e.target);
      }
    });
  },{threshold:0.08});
  document.querySelectorAll('.entry').forEach(e=>obs.observe(e));
}

/* ── FILTER ── */
function filter(el,tag){
  document.querySelectorAll('.ftag').forEach(t=>t.classList.remove('active'));
  el.classList.add('active');
  document.querySelectorAll('.entry').forEach(e=>{
    const show=tag==='todos'||e.dataset.tag===tag;
    e.classList.toggle('hidden',!show);
  });
}

/* ── RENDER ── */
function renderFeed(articles){
  const feed=document.getElementById('feed');
  const total=articles.length;
  feed.innerHTML=articles.map((a,i)=>{
    const n=total-i;
    const isLast=i===total-1;
    const lead=a.abstract||'';
    const para=firstPara(a.content);
    const tag=esc(a.discipline||'');
    const date=esc(fmtDate(a.published_at));
    const rt=a.read_time?(' · '+esc(a.read_time)):'';
    return`<div class="entry" data-tag="${tag}">
      <div class="entry-left">
        <span class="entry-n">${n}</span>
        <div class="entry-dot"></div>
        ${isLast?'':'<div class="entry-line"></div>'}
      </div>
      <div class="entry-body">
        <div class="entry-top">
          <span class="entry-tag">${tag}</span>
          <span class="entry-top-line"></span>
          <span class="entry-date">${date}${rt}</span>
        </div>
        <a href="article.html?id=${esc(a.id)}" style="text-decoration:none;color:inherit">
          <h2 class="entry-title">${esc(a.title)}</h2>
        </a>
        ${lead?`<p class="entry-lead">${esc(lead)}</p>`:''}
        ${para?`<p class="entry-p entry-p-first">${esc(para)}</p>`:''}
        <div class="entry-foot">
          <span class="entry-brand">Animi Regnum</span>
          <a class="entry-cta" href="article.html?id=${esc(a.id)}"><span class="cta-line"></span>Leer entrada</a>
        </div>
      </div>
    </div>`;
  }).join('');
  attachReveal();

  /* archive: last 4 */
  const arc=document.getElementById('sb-archive');
  arc.innerHTML=articles.slice(0,4).map(a=>`
    <div class="arc-item" onclick="location.href='article.html?id=${esc(a.id)}'">
      <div class="arc-cat">${esc(a.discipline||'')}</div>
      <div class="arc-t">${esc(a.title)}</div>
      <div class="arc-d">${esc(fmtMonth(a.published_at))}</div>
    </div>`).join('');

  /* stats */
  document.getElementById('stat-count').textContent=total;
}

/* ── LOAD ── */
(async()=>{
  let articles=[];
  try{
    const res=await fetch(SB_URL+'/rest/v1/articles?published=eq.true&order=published_at.desc',
      {headers:{'apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY}});
    const data=await res.json();
    if(res.ok&&Array.isArray(data)&&data.length)articles=data;
  }catch(e){}
  if(!articles.length)articles=DEMO_POSTS;
  renderFeed(articles);
})();
</script>
</body>
</html>
