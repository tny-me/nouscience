<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>JA Sachz</title>
<meta name="description" content="Notas breves sobre filosofía, estoicismo, fe y la búsqueda de paz."/>
<link rel="icon" type="image/png" href="favicon.png"/>
<link rel="apple-touch-icon" href="favicon.png"/>
<link rel="stylesheet" href="style.css"/>
</head>
<body>
<div class="wrap">
  <header class="site-header">
    <div>
      <a class="site-title" href="index.html">JA Sachz</a>
      <div class="site-tagline">Filosofía, estoicismo, fe y la búsqueda de paz.</div>
    </div>
    <nav class="site-nav">
      <a href="index.html">Inicio</a>
      <a href="admin.html">Editor</a>
    </nav>
  </header>

  <main>
    <ul class="post-list" id="postList">
      <li class="post-empty">Cargando artículos…</li>
    </ul>
  </main>

  <footer class="site-footer">
    <span>&copy; 2026 JA Sachz</span>
  </footer>
</div>

<script>
const SB_URL='https://xduylfmrmxqnbtpyyjvb.supabase.co';
const SB_KEY='sb_publishable_SySQb0TjyYmE8qZ8TD2CXw_z8rQG-65';

function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function fmtDate(iso){
  if(!iso)return'';
  try{return new Date(iso).toLocaleDateString('es-MX',{day:'numeric',month:'long',year:'numeric'});}catch{return'';}
}

async function loadPosts(){
  const list=document.getElementById('postList');
  let articles=[];
  try{
    const res=await fetch(SB_URL+'/rest/v1/articles?published=eq.true&order=published_at.desc',
      {headers:{'apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY}});
    articles=await res.json();
    if(!res.ok) throw new Error('Supabase error');
  }catch(e){
    list.innerHTML='<li class="post-empty">No se pudieron cargar los artículos.</li>';
    return;
  }

  if(!Array.isArray(articles)||!articles.length){
    list.innerHTML='<li class="post-empty">Todavía no hay artículos publicados.</li>';
    return;
  }

  list.innerHTML=articles.map(a=>`
    <li class="post-item">
      <div class="post-date">${esc(fmtDate(a.published_at))}</div>
      <h2 class="post-title"><a href="article.html?id=${esc(a.id)}">${esc(a.title)}</a></h2>
      ${a.abstract?`<p class="post-excerpt">${esc(a.abstract)}</p>`:''}
    </li>
  `).join('');
}

loadPosts();
</script>
</body>
</html>
