<script src="demo-posts.js"></script>
<script>
const SB_URL='https://xduylfmrmxqnbtpyyjvb.supabase.co';
const SB_KEY='sb_publishable_SySQb0TjyYmE8qZ8TD2CXw_z8rQG-65';

function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function fmtDate(iso){
  if(!iso)return'';
  try{return new Date(iso).toLocaleDateString('es-MX',{day:'numeric',month:'long',year:'numeric'});}catch{return'';}
}
function thumb(a){
  if(a.cover_image) return `<div class="feed-thumb"><img src="${esc(a.cover_image)}" alt=""/></div>`;
  return `<div class="feed-thumb placeholder"><span>JAS</span></div>`;
}

async function loadPosts(){
  const feed=document.getElementById('feed');
  let articles=[];
  try{
    const res=await fetch(SB_URL+'/rest/v1/articles?published=eq.true&order=published_at.desc',
      {headers:{'apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY}});
    articles=await res.json();
    if(!res.ok) throw new Error('Supabase error');
  }catch(e){
    articles=[];
  }

  if(!Array.isArray(articles)||!articles.length){
    articles=DEMO_POSTS;
  }

  feed.innerHTML=articles.map(a=>`
    <a class="feed-item" href="article.html?id=${esc(a.id)}">
      <div class="feed-main">
        <div class="feed-byline">
          <div class="feed-avatar">JAS</div>
          <span>${esc(a.author||'JA Sachz')}</span>
        </div>
        <h2 class="feed-title">${esc(a.title)}</h2>
        ${a.abstract?`<p class="feed-excerpt">${esc(a.abstract)}</p>`:''}
        <div class="feed-meta">
          <span>${esc(fmtDate(a.published_at))}</span>
          ${a.read_time?`<span>·</span><span>${esc(a.read_time)}</span>`:''}
          ${a.discipline?`<span class="feed-tag">${esc(a.discipline)}</span>`:''}
        </div>
      </div>
      ${thumb(a)}
    </a>
  `).join('');
}

loadPosts();
</script>
</body>
</html>
