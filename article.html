<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>JA Sachz</title>
<link rel="icon" type="image/png" href="favicon.png"/>
<link rel="apple-touch-icon" href="favicon.png"/>
<link rel="stylesheet" href="style.css"/>
</head>
<body>
<div class="wrap">
  <header class="site-header">
    <div>
      <a class="site-title" href="index.html">JA Sachz</a>
      <div class="site-tagline">Filosofía, estoicismo, fe y la búsqueda de paz.</div>
    </div>
    <nav class="site-nav">
      <a href="index.html">Inicio</a>
      <a href="admin.html">Editor</a>
    </nav>
  </header>

  <main>
    <article class="post" id="post">
      <p class="post-empty">Cargando…</p>
    </article>
  </main>

  <footer class="site-footer">
    <span>&copy; 2026 JA Sachz</span>
  </footer>
</div>

<script>
const SB_URL='https://xduylfmrmxqnbtpyyjvb.supabase.co';
const SB_KEY='sb_publishable_SySQb0TjyYmE8qZ8TD2CXw_z8rQG-65';

function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function fmtDate(iso){
  if(!iso)return'';
  try{return new Date(iso).toLocaleDateString('es-MX',{day:'numeric',month:'long',year:'numeric'});}catch{return'';}
}

async function loadPost(){
  const post=document.getElementById('post');
  const id=new URLSearchParams(location.search).get('id');
  if(!id){
    post.innerHTML='<p class="post-empty">Artículo no encontrado.</p><a class="post-back" href="index.html">&larr; Volver al inicio</a>';
    return;
  }

  let a=null;
  try{
    const res=await fetch(SB_URL+'/rest/v1/articles?id=eq.'+encodeURIComponent(id)+'&select=*',
      {headers:{'apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY}});
    const data=await res.json();
    if(!res.ok || !Array.isArray(data) || !data.length) throw new Error('not found');
    a=data[0];
  }catch(e){
    post.innerHTML='<p class="post-empty">Artículo no encontrado.</p><a class="post-back" href="index.html">&larr; Volver al inicio</a>';
    return;
  }

  document.title=(a.title||'JA Sachz')+' — JA Sachz';
  post.innerHTML=`
    <div class="post-date">${esc(fmtDate(a.published_at))}</div>
    <h1>${esc(a.title)}</h1>
    ${a.subtitle?`<div class="post-subtitle">${esc(a.subtitle)}</div>`:''}
    <div class="post-content">${a.content||''}</div>
    <a class="post-back" href="index.html">&larr; Volver al inicio</a>
  `;
}

loadPost();
</script>
</body>
</html>
