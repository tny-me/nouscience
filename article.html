<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>JA Sachz</title>
<link rel="icon" type="image/png" href="favicon.png"/>
<link rel="apple-touch-icon" href="favicon.png"/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="style.css"/>
</head>
<body>
<div class="wrap">
  <header class="site-header">
    <div>
      <a class="site-title" href="index.html">JA Sachz</a>
      <div class="site-tagline">Filosofía, estoicismo, fe y la búsqueda de paz.</div>
    </div>
    <nav class="site-nav">
      <a href="index.html">Inicio</a>
      <a href="admin.html">Editor</a>
    </nav>
  </header>

  <main>
    <article id="post">
      <div class="post-empty">Cargando…</div>
    </article>
  </main>

  <footer class="site-footer">
    <span>&copy; 2026 JA Sachz</span>
  </footer>
</div>

<script>
const SB_URL='https://xduylfmrmxqnbtpyyjvb.supabase.co';
const SB_KEY='sb_publishable_SySQb0TjyYmE8qZ8TD2CXw_z8rQG-65';

function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function fmtDate(iso){
  if(!iso)return'';
  try{return new Date(iso).toLocaleDateString('es-MX',{day:'numeric',month:'long',year:'numeric'});}catch{return'';}
}

async function loadPost(){
  const post=document.getElementById('post');
  const id=new URLSearchParams(location.search).get('id');
  if(!id){
    post.innerHTML='<div class="post-empty">Artículo no encontrado.</div><div class="post-back-wrap"><a class="post-back" href="index.html">&larr; Volver al inicio</a></div>';
    return;
  }

  let a=null;
  try{
    const res=await fetch(SB_URL+'/rest/v1/articles?id=eq.'+encodeURIComponent(id)+'&select=*',
      {headers:{'apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY}});
    const data=await res.json();
    if(!res.ok || !Array.isArray(data) || !data.length) throw new Error('not found');
    a=data[0];
  }catch(e){
    post.innerHTML='<div class="post-empty">Artículo no encontrado.</div><div class="post-back-wrap"><a class="post-back" href="index.html">&larr; Volver al inicio</a></div>';
    return;
  }

  document.title=(a.title||'JA Sachz')+' — JA Sachz';
  post.innerHTML=`
    <div class="post-header">
      ${a.discipline?`<span class="post-tag">${esc(a.discipline)}</span>`:''}
      <h1 class="post-title">${esc(a.title)}</h1>
      ${a.subtitle?`<p class="post-subtitle">${esc(a.subtitle)}</p>`:''}
      <div class="post-meta">${esc(fmtDate(a.published_at))}${a.author?' · '+esc(a.author):''}${a.read_time?' · '+esc(a.read_time):''}</div>
    </div>
    ${a.cover_image?`<div class="post-cover"><img src="${esc(a.cover_image)}" alt=""/></div>`:''}
    <div class="post-body">${a.content||''}</div>
    <div class="post-back-wrap"><a class="post-back" href="index.html">&larr; Volver al inicio</a></div>
  `;
}

loadPost();
</script>
</body>
</html>
